<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Produk Emina Cosmetics</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- DATATABLE -->
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #fff8fb, #ffeef5);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* BACKGROUND ANIMATION */

        .bg-decor {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 192, 203, 0.25);
            animation: float 12s infinite ease-in-out;
        }

        .bubble:nth-child(1) {
            width: 120px;
            height: 120px;
            left: 10%;
            top: 60%;
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            width: 80px;
            height: 80px;
            left: 70%;
            top: 80%;
            animation-delay: 2s;
        }

        .bubble:nth-child(3) {
            width: 150px;
            height: 150px;
            left: 85%;
            top: 40%;
            animation-delay: 4s;
        }

        .bubble:nth-child(4) {
            width: 60px;
            height: 60px;
            left: 20%;
            top: 20%;
            animation-delay: 6s;
        }

        .bubble:nth-child(5) {
            width: 100px;
            height: 100px;
            left: 50%;
            top: 70%;
            animation-delay: 8s;
        }

        @keyframes float {
            0% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-30px)
            }

            100% {
                transform: translateY(0)
            }
        }

        /* HEADER */

        .hero {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero-badge {
            display: inline-block;
            background: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #f3dce6;
            color: #e86fa1;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .hero-title {
            color: #d25b8e;
            font-weight: 800;
            font-size: 2.6rem;
        }

        /* LAYOUT */

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* CARD */

        .card-soft {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #f1d8e4;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(230, 120, 170, 0.08);
        }

        .card-body {
            padding: 24px;
        }

        .section-title {
            color: #d25b8e;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* FORM */

        .form-control,
        .form-select {
            border-radius: 15px;
            border: 1px solid #f2d7e3;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #e86fa1;
            box-shadow: 0 0 0 0.2rem rgba(232, 111, 161, 0.15);
        }

        /* BUTTON */

        .btn-pink {
            background: linear-gradient(135deg, #ef8ab4, #e86fa1);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 15px;
            padding: 10px 16px;
        }

        .btn-pink:hover {
            background: #df5c94;
        }

        .btn-soft {
            background: #fff2f7;
            border: 1px solid #f3dce6;
            color: #d25b8e;
            border-radius: 15px;
        }

        /* TABLE */

        .table-shell {
            background: white;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #f3dce6;
        }

        .badge-category {
            background: #fff1f7;
            border: 1px solid #f2dbe6;
            padding: 6px 12px;
            border-radius: 30px;
            color: #c45a8c;
            font-weight: 600;
        }

        /* ICON BUTTON */

        .icon-btn {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .btn-edit {
            background: #fff3cd;
            color: #856404;
        }

        .btn-delete {
            background: #ffe3ec;
            color: #b84d7d;
        }

        .icon-btn:hover {
            transform: scale(1.05);
        }

        @media(max-width:900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="bg-decor">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container py-4">

        <div class="hero">
            <div class="hero-badge">Emina Cosmetics Product Data</div>
            <h1 class="hero-title">Data Produk Skincare Emina</h1>
        </div>

        <div class="main-grid">

            <!-- FORM -->

            <div class="card-soft">
                <div class="card-body">

                    <h4 class="section-title">Form Input Produk</h4>

                    <form id="productForm">

                        <input type="hidden" id="productId">

                        <div class="mb-3">
                            <label class="form-label">Nama Produk</label>
                            <input type="text" class="form-control" id="namaProduk" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kategori</label>
                            <select class="form-select" id="kategori">
                                <option value="">Pilih kategori</option>
                                <option>Face Wash</option>
                                <option>Moisturizer</option>
                                <option>Serum</option>
                                <option>Sunscreen</option>
                                <option>Toner</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Harga</label>
                            <input type="number" class="form-control" id="harga" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-pink">Simpan</button>
                            <button type="button" class="btn btn-soft" id="resetBtn">Reset</button>
                        </div>

                    </form>

                </div>
            </div>

            <!-- TABLE -->

            <div class="card-soft">
                <div class="card-body">

                    <h4 class="section-title">Daftar Produk</h4>

                    <div class="table-shell">

                        <table id="productTable" class="table align-middle" style="width:100%">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Nama Produk</th>
                                    <th>Kategori</th>
                                    <th>Harga</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>

                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- JS -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script>

        const productStore = {
            data: {},
            currentId: 1,

            add(product) {
                const id = this.currentId++;
                this.data[id] = { id, ...product };
            },

            update(id, data) {
                this.data[id] = { id: Number(id), ...data };
            },

            delete(id) {
                delete this.data[id];
            },

            getAll() {
                return Object.values(this.data);
            },

            getById(id) {
                return this.data[id];
            }

        };

        let dataTable;

        function formatRupiah(num) {
            return "Rp " + Number(num).toLocaleString("id-ID");
        }

        function renderTable() {

            const products = productStore.getAll();

            dataTable.clear();

            products.forEach((p, i) => {

                dataTable.row.add([
                    i + 1,
                    p.namaProduk,
                    `<span class="badge-category">${p.kategori}</span>`,
                    formatRupiah(p.harga),

                    `
<div style="display:flex;gap:6px">
<button class="icon-btn btn-edit" onclick="editProduct(${p.id})">
<i class="bi bi-pencil"></i>
</button>

<button class="icon-btn btn-delete" onclick="deleteProduct(${p.id})">
<i class="bi bi-trash"></i>
</button>
</div>
`

                ]);

            });

            dataTable.draw();

        }

        function resetForm() {
            document.getElementById("productForm").reset();
            document.getElementById("productId").value = "";
        }

        function editProduct(id) {

            const p = productStore.getById(id);

            document.getElementById("productId").value = p.id;
            document.getElementById("namaProduk").value = p.namaProduk;
            document.getElementById("kategori").value = p.kategori;
            document.getElementById("harga").value = p.harga;

        }

        function deleteProduct(id) {

            if (confirm("Hapus produk ini?")) {
                productStore.delete(id);
                renderTable();
            }

        }

        document.addEventListener("DOMContentLoaded", () => {

            dataTable = $("#productTable").DataTable({
                pageLength: 5
            });

            productStore.add({
                namaProduk: "Emina Bright Stuff Face Wash",
                kategori: "Face Wash",
                harga: 32000
            });

            productStore.add({
                namaProduk: "Emina Ms. Pimple Moisturizing Gel",
                kategori: "Moisturizer",
                harga: 29000
            });

            productStore.add({
                namaProduk: "Emina Sun Battle SPF 35",
                kategori: "Sunscreen",
                harga: 36000
            });

            renderTable();

            document.getElementById("productForm")
                .addEventListener("submit", (e) => {

                    e.preventDefault();

                    const id = document.getElementById("productId").value;

                    const data = {
                        namaProduk: document.getElementById("namaProduk").value,
                        kategori: document.getElementById("kategori").value,
                        harga: Number(document.getElementById("harga").value)
                    };

                    if (id) {
                        productStore.update(id, data);
                    } else {
                        productStore.add(data);
                    }

                    renderTable();
                    resetForm();

                });

            document.getElementById("resetBtn")
                .addEventListener("click", resetForm);

        });

    </script>

</body>

</html>
