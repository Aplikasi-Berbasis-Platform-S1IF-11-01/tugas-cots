<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Camera Catalog - Bayu Kuncoro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-4">

<!-- HEADER -->
<div class="header-box text-center mb-4">

<h1>📷 Camera Product Catalog</h1>
<p>Product Management - Bayu Kuncoro Adi</p>
<p>2311102031</p>

</div>


<!-- FORM -->

<div class="card form-box mb-4">

<div class="card-body">

<h5 class="mb-3">Tambah Produk</h5>

<form id="productForm">

<input type="hidden" id="productId">

<div class="row g-2">

<div class="col-md-4">
<input type="text"
class="form-control"
placeholder="Nama Produk"
id="namaProduk"
required>
</div>

<div class="col-md-4">
<input type="text"
class="form-control"
placeholder="Kategori"
id="kategoriProduk"
required>
</div>

<div class="col-md-4">
<input type="number"
class="form-control"
placeholder="Harga"
id="hargaProduk"
required>
</div>

</div>

<div class="mt-3">

<button class="btn btn-primary" id="submitBtn">
Tambah Produk
</button>

<button type="button"
class="btn btn-secondary"
id="cancelEditBtn"
style="display:none">

Batal Edit

</button>

</div>

</form>

</div>

</div>



<!-- KATALOG PRODUK -->

<h4 class="mb-3">Katalog Produk</h4>

<div class="row g-3" id="catalog"></div>



<!-- TABEL -->

<h4 class="mt-4 mb-3">Database Produk</h4>

<table id="productTable"
class="table table-striped">

<thead>

<tr>
<th>No</th>
<th>Produk</th>
<th>Kategori</th>
<th>Harga</th>
<th>Aksi</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>



<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="script.js"></script>

</body>
</html>
