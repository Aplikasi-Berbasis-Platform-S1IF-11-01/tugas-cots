<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CRUD Products Bayu Kuncoro Adi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5">

<!-- HEADER -->
<div class="header-box text-center mb-4">

<h1 class="fw-bold">
CRUD Products
</h1>

<h4 class="text-primary">
Bayu Kuncoro Adi
</h4>

<p>NIM : 2311102031</p>

</div>


<!-- STATISTIK -->
<div class="row mb-4 g-3 text-center">

<div class="col-md-4">
<div class="stat-card bg-primary text-white">
<h4 id="totalProduk">0</h4>
<p>Total Produk</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-card bg-success text-white">
<h4 id="totalKategori">0</h4>
<p>Total Kategori</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-card bg-warning text-dark">
<h4 id="totalNilai">Rp 0</h4>
<p>Total Nilai Produk</p>
</div>
</div>

</div>


<div class="row g-4">

<!-- FORM -->
<div class="col-lg-4">

<div class="card shadow border-0">

<div class="card-body">

<h4 class="mb-3">Form Produk</h4>

<form id="productForm">

<input type="hidden" id="productId">

<div class="mb-3">
<label>Nama Produk</label>
<input type="text" id="namaProduk"
class="form-control" required>
</div>

<div class="mb-3">
<label>Kategori</label>
<input type="text" id="kategoriProduk"
class="form-control" required>
</div>

<div class="mb-3">
<label>Harga</label>
<input type="number" id="hargaProduk"
class="form-control" required>
</div>

<button class="btn btn-primary w-100"
id="submitBtn">
Tambah Produk
</button>

<button type="button"
class="btn btn-secondary w-100 mt-2"
id="cancelEditBtn"
style="display:none">

Batal Edit

</button>

</form>

</div>
</div>

</div>


<!-- TABEL -->
<div class="col-lg-8">

<div class="card shadow border-0">

<div class="card-body">

<h4 class="mb-3">Daftar Produk</h4>

<table id="productTable"
class="table table-striped">

<thead class="table-dark">

<tr>
<th>No</th>
<th>Produk</th>
<th>Kategori</th>
<th>Harga</th>
<th>Aksi</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>
</div>

</div>

</div>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="script.js"></script>

</body>
</html>
