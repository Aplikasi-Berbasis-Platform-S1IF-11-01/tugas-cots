<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Produk Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<style>

body{
background: linear-gradient(135deg,#ffe6f2,#ffd6eb);
font-family: 'Segoe UI', sans-serif;
}

/* TITLE */
.page-title{
color:#ff4da6;
font-weight:700;
}

/* CARD */
.card{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card-header{
background:#ff66b2;
color:white;
font-weight:600;
border-radius:15px 15px 0 0;
}

/* BUTTON */
.btn-pink{
background:#ff4da6;
color:white;
border:none;
}

.btn-delete{
background:#ff1a75;
color:white;
}

/* MODAL DESIGN */

.modal-content{
border-radius:15px;
border:none;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.modal-header{
background:#ff66b2;
color:white;
border-radius:15px 15px 0 0;
}

.modal-body input{
border-radius:10px;
border:1px solid #ffcce6;
}

.modal-body input:focus{
border-color:#ff4da6;
box-shadow:0 0 5px rgba(255,77,166,0.5);
}

.modal-footer .btn-success{
background:#ff4da6;
border:none;
}

.modal-footer .btn-success:hover{
background:#e60073;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center page-title mb-1">
🌸 Produk Store 🌸
</h2>

<p class="text-center text-dark mb-4">
2311102158 - Shafa Adila Santoso
</p>

<div class="row">

<div class="col-md-4">

<div class="card">

<div class="card-header">
Form Input Produk
</div>

<div class="card-body">

<form id="formProduk">

<div class="mb-3">
<label>Nama Produk</label>
<input type="text" id="namaProduk" class="form-control" required>
</div>

<div class="mb-3">
<label>Kategori</label>
<input type="text" id="kategori" class="form-control" required>
</div>

<div class="mb-3">
<label>Harga</label>
<input type="number" id="harga" class="form-control" required>
</div>

<button type="submit" class="btn btn-pink w-100">
Simpan Produk
</button>

</form>

</div>
</div>

</div>


<div class="col-md-8">

<div class="card">

<div class="card-header">
Data Produk
</div>

<div class="card-body">

<table id="tabelProduk" class="table table-striped">

<thead>
<tr>
<th>No</th>
<th>Nama Produk</th>
<th>Kategori</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
</div>

</div>

</div>

</div>


<!-- MODAL EDIT -->

<div class="modal fade" id="editModal" tabindex="-1">
<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">🌸 Edit Produk</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="mb-3">
<label>Nama Produk</label>
<input type="text" id="editNama" class="form-control">
</div>

<div class="mb-3">
<label>Kategori</label>
<input type="text" id="editKategori" class="form-control">
</div>

<div class="mb-3">
<label>Harga</label>
<input type="number" id="editHarga" class="form-control">
</div>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
<button class="btn btn-success" onclick="updateProduk()">Update</button>
</div>

</div>
</div>
</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="script.js"></script>

</body>
</html>
