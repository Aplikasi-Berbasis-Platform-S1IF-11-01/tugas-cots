<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Produk - COTS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container main-wrapper">
        <h2 class="text-center page-title mb-4">🛒 Manajemen Data Produk Avrizal</h2>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white" id="formTitle">Input Produk Baru</div>
            <div class="card-body">
                <form id="formProduk" class="row g-3">
                    <input type="hidden" id="editId">

                    <div class="col-md-4">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" id="namaProduk" class="form-control" placeholder="Contoh: Laptop" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Kategori</label>
                        <select id="kategori" class="form-select" required>
                            <option value="">Pilih...</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Pakaian">Pakaian</option>
                            <option value="Makanan">Makanan</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Harga (Rp)</label>
                        <input type="number" id="harga" class="form-control" placeholder="0" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" id="btnSubmit" class="btn btn-success w-100 shadow-sm">Simpan</button>
                        <button type="button" id="btnCancel" class="btn btn-secondary w-100 shadow-sm d-none"
                            onclick="batalEdit()">Batal</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card table-container">
            <div class="card-body">
                <div class="table-responsive">
                    <table id="tabelProduk" class="table table-hover w-100 align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nama Produk</th>
                                <th>Kategori</th>
                                <th>Harga</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="isiTabel">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script src="COTS.js"></script>

</body>

</html>
