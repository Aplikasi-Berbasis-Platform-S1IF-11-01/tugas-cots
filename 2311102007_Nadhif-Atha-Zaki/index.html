<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD Data Produk | Nadhif Atha Zaki</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- DataTables CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <div class="header-box text-center mb-4">
      <h1 class="fw-bold mb-2">CRUD Data Produk</h1>
      <p class="mb-1"><strong>Nama:</strong> Nadhif Atha Zaki</p>
      <p class="mb-0"><strong>NIM:</strong> 2311102007</p>
    </div>

    <div class="row g-4">
      <!-- Form Input -->
      <div class="col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body p-4">
            <h3 class="card-title mb-4">Form Input Produk</h3>

            <form id="productForm">
              <input type="hidden" id="productId" />

              <div class="mb-3">
                <label for="namaProduk" class="form-label">Nama Produk</label>
                <input
                  type="text"
                  class="form-control"
                  id="namaProduk"
                  placeholder="Masukkan nama produk"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="kategoriProduk" class="form-label">Kategori</label>
                <input
                  type="text"
                  class="form-control"
                  id="kategoriProduk"
                  placeholder="Masukkan kategori produk"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="hargaProduk" class="form-label">Harga</label>
                <input
                  type="number"
                  class="form-control"
                  id="hargaProduk"
                  placeholder="Masukkan harga produk"
                  min="0"
                  required
                />
              </div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  Tambah Produk
                </button>
                <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display: none;">
                  Batal Edit
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Tabel Data -->
      <div class="col-lg-8">
        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body p-4">
            <h3 class="card-title mb-4">Tabel Data Produk</h3>

            <div class="table-responsive">
              <table id="productTable" class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>No</th>
                    <th>Nama Produk</th>
                    <th>Kategori</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Data akan diisi lewat JavaScript -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
